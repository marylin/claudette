version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: "tailwindcss"
        versions: [">=4.0.0"]
    groups:
      electron:
        patterns:
          - "electron"
          - "electron-builder"
          - "electron-updater"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      dev-tools:
        patterns:
          - "typescript"
          - "vite"
          - "tailwindcss"
          - "vitest"
          - "playwright"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
